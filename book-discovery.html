<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Book a Discovery Call | Project2Pixel</title>

  <meta name="description" content="Book a discovery call with Project2Pixel to discuss your business, automation, AI workflows, website development or digital systems needs.">

  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" href="project2pixel-logo-480.png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#f3f4f6;
      color:#111827;
    }

    .booking-wrapper{
      width:100%;
      min-height:100vh;
      padding:40px 20px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .booking-card{
      width:100%;
      max-width:1200px;
      background:#ffffff;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 35px rgba(0,0,0,0.08);
    }

    .booking-header{
      background:#000000;
      padding:35px 20px;
      text-align:center;
    }

    .booking-header img{
      width:180px;
      max-width:100%;
      margin-bottom:18px;
    }

    .booking-header h1{
      color:#ffffff;
      font-size:34px;
      margin-bottom:10px;
    }

    .booking-header p{
      color:#d1d5db;
      font-size:16px;
      max-width:700px;
      margin:auto;
      line-height:1.6;
    }

    .booking-content{
      padding:0;
    }

    .calendly-inline-widget{
      min-width:320px;
      height:850px;
    }

    @media(max-width:768px){

      .booking-header{
        padding:30px 20px;
      }

      .booking-header img{
        width:140px;
      }

      .booking-header h1{
        font-size:28px;
      }

      .booking-header p{
        font-size:15px;
      }

      .calendly-inline-widget{
        height:900px;
      }
    }
  </style>
</head>

<body>

  <div class="booking-wrapper">

    <div class="booking-card">

      <div class="booking-header">

        <img 
          src="https://raw.githubusercontent.com/natashafuji/project2pixel/main/project2pixel-logo-480.png" 
          alt="Project2Pixel Logo"
        >

        <h1>Book a Discovery Call</h1>

        <p>
          Let’s discuss your business goals, website requirements, automation needs, 
          workflow systems or digital strategy and see how Project2Pixel can assist.
        </p>

      </div>

      <div class="booking-content">

        <div 
          class="calendly-inline-widget" 
          data-url="https://calendly.com/project2pixel-info/30min">
        </div>

      </div>

    </div>

  </div>

  <script 
    type="text/javascript" 
    src="https://assets.calendly.com/assets/external/widget.js" 
    async>
  </script>

  <script>
    window.addEventListener("message", function(e) {
      if (e.data.event && e.data.event === "calendly.event_scheduled") {
        window.location.href = "https://www.project2pixel.co.za/thank-you.html";
      }
    });
  </script>

</body>
</html>
